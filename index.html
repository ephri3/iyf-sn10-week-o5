<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>My To-Do List</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet"/>
</head>
<body>

    <div class="container">
        <header>
            <h1>My To-Do List</h1>
            <p class="subtitle">Built with DOM manipulation &amp; event listeners</p>
        </header>
        <div class="stats">
            <div class="stat-item">
                <span class="stat-label">TOTAL</span>
                <span class="stat-value" id="total-count">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">ACTIVE</span>
                <span class="stat-value" id="active-count">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">COMPLETED</span>
                <span class="stat-value" id="completed-count">0</span>
            </div>
        </div>
        <div class="input-row">
            <input type="text" id="task-input" placeholder="Add a new task..." />
            <button id="add-btn">Add Task</button>
        </div>
        <div class="filter-tabs">
            <button class="tab-btn active" data-filter="all">ALL</button>
            <button class="tab-btn" data-filter="active">ACTIVE</button>
            <button class="tab-btn" data-filter="completed">COMPLETED</button>
        </div>
        <ul id="task-list"></ul>
        <div class="footer">
            <button id="clear-btn">Clear Completed</button>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
